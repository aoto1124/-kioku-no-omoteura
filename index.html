<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶の裏表 Ver.2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen" class="screen">
    <h1>🧠 記憶の裏表 Ver.2.0</h1>

    <p>難易度を選んでスタート！</p>

    <select id="difficulty">
        <option value="4">Easy (4×4)</option>
        <option value="5">Normal (5×4)</option>
        <option value="6">Hard (6×4)</option>
    </select>

    <button id="startBtn">
        START
    </button>
</div>

<div id="gameScreen" class="hidden">

    <header>

        <div class="info">
            ⏱ <span id="timer">0</span>s
        </div>

        <div class="info">
            ⭐ Score:
            <span id="score">0</span>
        </div>

        <div class="info">
            🔥 Combo:
            <span id="combo">0</span>
        </div>

    </header>

    <div id="board"></div>

    <button id="restartBtn">
        リスタート
    </button>

</div>

<div id="clearScreen" class="screen hidden">

    <h2>🎉 GAME CLEAR!</h2>

    <p>
        Time :
        <span id="finalTime"></span>s
    </p>

    <p>
        Score :
        <span id="finalScore"></span>
    </p>

    <p>
        High Score :
        <span id="highScore"></span>
    </p>

    <button id="againBtn">
        もう一回
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
